<!doctype html>
<html lang="en" dir="ltr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <meta name="theme-color" content="#315f58">
  <title>Rooted | جذور</title>
  <style>
    :root{--ink:#18332f;--muted:#63746f;--sage:#dce8df;--deep:#315f58;--gold:#c99b5a;--ivory:#f7f3e9;--paper:#fffdf7;--danger:#8d3f38;--shadow:0 22px 60px rgba(32,70,62,.12)}
    *{box-sizing:border-box}body{margin:0;background:radial-gradient(circle at 90% 5%,#dceadf 0,transparent 32%),linear-gradient(150deg,#faf6ec,#edf4ee);color:var(--ink);font-family:Inter,Arial,sans-serif;min-height:100vh}button,input{font:inherit}button{cursor:pointer}a{color:inherit}.app{max-width:1100px;margin:auto;min-height:100vh;padding:22px}.top{display:flex;align-items:center;justify-content:space-between;gap:12px}.brand{font:700 24px Georgia,serif;letter-spacing:.02em}.controls{display:flex;gap:8px}.iconbtn{border:1px solid #cad9d0;background:rgba(255,255,255,.66);color:var(--ink);border-radius:999px;padding:9px 13px}.hero{display:grid;grid-template-columns:1.2fr .8fr;gap:50px;align-items:center;min-height:78vh}.eyebrow{color:var(--deep);text-transform:uppercase;letter-spacing:.16em;font-size:12px;font-weight:800}.hero h1,.screen h1{font:500 clamp(42px,7vw,82px)/.98 Georgia,serif;margin:18px 0}.hero h1 span{color:var(--deep)}.hero p,.lead{font-size:18px;line-height:1.65;color:var(--muted);max-width:620px}.primary,.secondary,.danger{border:0;border-radius:999px;padding:14px 22px;font-weight:750}.primary{background:var(--deep);color:white;box-shadow:0 10px 25px rgba(49,95,88,.25)}.secondary{background:white;color:var(--ink);border:1px solid #ccd9d1}.danger{background:#f4dfdc;color:var(--danger)}.actions{display:flex;gap:10px;flex-wrap:wrap;margin-top:28px}.orbit{width:min(360px,75vw);aspect-ratio:1;border:1px solid #9bbab0;border-radius:50%;display:grid;place-items:center;position:relative;margin:auto;animation:float 6s ease-in-out infinite}.orbit:before,.orbit:after{content:"";position:absolute;border-radius:50%;border:1px solid #bdd1c8}.orbit:before{inset:14%}.orbit:after{inset:29%;background:rgba(255,253,247,.55)}.orb-center{z-index:2;text-align:center;font:500 40px Georgia,serif}.dot{position:absolute;width:16px;height:16px;border-radius:50%;background:var(--gold);top:8%;left:25%;box-shadow:0 0 0 9px rgba(201,155,90,.15)}@keyframes float{50%{transform:translateY(-10px)}}.screen{max-width:760px;margin:55px auto;background:rgba(255,253,247,.9);border:1px solid rgba(87,119,108,.2);border-radius:30px;padding:clamp(24px,5vw,48px);box-shadow:var(--shadow)}.screen h1{font-size:clamp(36px,6vw,62px)}.screen h2{font:500 32px Georgia,serif}.note{padding:15px 17px;background:#edf3ee;border-radius:16px;line-height:1.55;color:#425c55}.small{font-size:13px;color:var(--muted);line-height:1.5}.choices,.prefs,.moods{display:grid;gap:12px;margin:22px 0}.choice,.pref,.mood{padding:17px;border:1px solid #cad9d0;border-radius:18px;background:white;color:var(--ink);text-align:start}.choice:hover,.pref:hover,.pref.on,.mood:hover,.mood.on{border-color:var(--deep);background:#eaf2ed}.choice strong{display:block;margin-bottom:5px}.check{display:flex;gap:10px;align-items:flex-start;margin:20px 0}.check input{margin-top:4px}.progress{height:7px;background:#dce6df;border-radius:10px;overflow:hidden;margin:22px 0}.progress span{display:block;height:100%;background:var(--deep)}.scale{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;margin:22px 0}.scale button{aspect-ratio:1;border-radius:16px;border:1px solid #cbd8d0;background:#fff;color:var(--ink);font-weight:800}.scale button:hover{background:var(--sage)}.anchor-labels{display:flex;justify-content:space-between;color:var(--muted);font-size:12px}.moods{grid-template-columns:repeat(3,1fr)}.mood{text-align:center}.prefs{grid-template-columns:repeat(2,1fr)}.pref.on:after{content:" ✓"}.result{border-left:4px solid var(--gold);padding-left:20px;margin:25px 0}.cards{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin:24px 0}.stat{background:#edf3ee;border-radius:16px;padding:16px;text-align:center}.stat b{display:block;font:600 27px Georgia,serif}.history{width:100%;border-collapse:collapse}.history th,.history td{text-align:start;border-bottom:1px solid #dbe4dd;padding:11px 5px}.safety{border-color:#e0b4ae}.safety h1{color:var(--danger)}.hotline{display:block;text-decoration:none;border:1px solid #dfb8b2;background:#fff8f6;border-radius:17px;padding:16px;margin:10px 0}.hotline b{display:block;font-size:24px}.hidden{display:none!important}.footer{text-align:center;color:var(--muted);font-size:12px;padding:20px}.lock{font-size:12px;color:var(--deep);margin-top:12px}.toast{position:fixed;left:50%;bottom:22px;transform:translateX(-50%);background:var(--ink);color:white;padding:11px 18px;border-radius:999px;z-index:10}.pin{width:100%;font-size:22px;letter-spacing:.2em;padding:15px;border:1px solid #b9cbc1;border-radius:14px}.rtl{direction:rtl}.rtl .result{border-left:0;border-right:4px solid var(--gold);padding-left:0;padding-right:20px}@media(max-width:760px){.hero{grid-template-columns:1fr;gap:0}.orbit{display:none}.cards{grid-template-columns:repeat(2,1fr)}.moods{grid-template-columns:1fr}.app{padding:15px}.screen{margin:28px auto}.top{align-items:flex-start}}
  </style>
</head>
<body>
<main class="app" id="app">
  <header class="top"><div class="brand">Rooted | جذور</div><div class="controls"><button class="iconbtn" id="sound">♫ <span data-t="sound">Sound</span></button><button class="iconbtn" id="lang">العربية</button></div></header>
  <section id="view"></section>
  <footer class="footer" data-t="disclaimer">A wellbeing reflection tool — not therapy, diagnosis, or emergency care.</footer>
</main>
<div id="toast" class="toast hidden"></div>
<script>
(()=>{
const $=s=>document.querySelector(s), KEY='rooted.encrypted.v1';
const T={
 en:{sound:'Sound',disclaimer:'A wellbeing reflection tool — not therapy, diagnosis, or emergency care.',eyebrow:'A two-minute daily pause',title:'Find your footing, one small step at a time.',intro:'A private, culturally respectful wellbeing check-in for expatriate professionals navigating work, connection, home and self.',begin:'Begin today’s check-in',history:'View my progress',privacy:'Privacy comes first.',privacyText:'Choose a private session that disappears when you close this page, or save encrypted progress on this device with a Rooted PIN.',private:'Private session',privateD:'Nothing from the check-in is saved.',saved:'Save encrypted progress',savedD:'Your entries stay encrypted in this browser. No account or cloud database.',age:'I confirm I am 18 or older.',continue:'Continue',pinTitle:'Create your Rooted PIN',pinText:'Use at least 6 digits. Rooted never stores the PIN and cannot recover it.',unlock:'Unlock your progress',wrong:'That PIN could not unlock this data.',erase:'Erase saved data',prefTitle:'What kinds of small actions feel right for you?',prefText:'Choose any that fit. Rooted never guesses your culture, faith, family structure or identity.',prefs:['Private / solo','Family connection','Community','Faith / spiritual','Movement','Outdoors'],moodQ:'How are you arriving today?',moods:['Steady','Stretched','Low','Restless','Disconnected','Unsafe'],q:['How manageable did work feel today?','How connected did you feel to people around you?','How held did you feel by home, family or familiar people?','How much space did you have to feel like yourself?'],anchors:['Work','People','Home','Self'],low:'Not at all',high:'Very much',result:'One small step for today',back:'Back to home',dashboard:'Your recent pattern',noEntries:'No saved check-ins yet.',avg:'average',export:'Export encrypted backup',safety:'You deserve immediate human support.',safetyText:'If you may act on thoughts of harming yourself or someone else, call emergency services now or go to the nearest emergency department. Stay near another person if you can.',police:'UAE Police',ambulance:'UAE Ambulance',sakina:'Abu Dhabi mental health support',official:'Official sources',safeBack:'I am safe right now — return home',lock:'Saved progress automatically locks after five minutes.',clear:'All saved Rooted data was erased.',savedOk:'Encrypted on this device.',pick:'Please select at least one preference.',pinNeed:'Enter at least 6 digits.',secure:'Encrypted saving needs a secure browser context. You can still use Private session.'},
 ar:{sound:'الصوت',disclaimer:'أداة للتأمل في العافية — وليست علاجاً أو تشخيصاً أو رعاية طارئة.',eyebrow:'وقفة يومية لدقيقتين',title:'استعد توازنك، خطوة صغيرة كل مرة.',intro:'تسجيل خاص ومراعٍ للثقافة للمهنيين المغتربين أثناء التعامل مع العمل والتواصل والوطن والذات.',begin:'ابدأ تسجيل اليوم',history:'عرض تقدمي',privacy:'الخصوصية أولاً.',privacyText:'اختر جلسة خاصة تختفي عند إغلاق الصفحة، أو احفظ تقدمك مشفراً على هذا الجهاز برمز جذور.',private:'جلسة خاصة',privateD:'لن يتم حفظ أي شيء من التسجيل.',saved:'حفظ التقدم بشكل مشفر',savedD:'تبقى إدخالاتك مشفرة في هذا المتصفح. لا حساب ولا قاعدة بيانات سحابية.',age:'أؤكد أن عمري 18 عاماً أو أكثر.',continue:'متابعة',pinTitle:'أنشئ رمز جذور',pinText:'استخدم 6 أرقام على الأقل. لا يخزن جذور الرمز ولا يستطيع استعادته.',unlock:'افتح تقدمك',wrong:'تعذر فتح البيانات بهذا الرمز.',erase:'مسح البيانات المحفوظة',prefTitle:'ما أنواع الخطوات الصغيرة المناسبة لك؟',prefText:'اختر ما يناسبك. لا يفترض جذور ثقافتك أو دينك أو أسرتك أو هويتك.',prefs:['فردي / خاص','التواصل العائلي','المجتمع','الإيمان / الروحانيات','الحركة','الهواء الطلق'],moodQ:'كيف تشعر عند وصولك اليوم؟',moods:['متوازن','مرهق','منخفض','قلق','منفصل','غير آمن'],q:['إلى أي مدى كان العمل قابلاً للإدارة اليوم؟','إلى أي مدى شعرت بالتواصل مع من حولك؟','إلى أي مدى شعرت بدعم الوطن أو العائلة أو الأشخاص المألوفين؟','كم من المساحة أتيحت لك لتشعر بأنك على طبيعتك؟'],anchors:['العمل','الناس','الوطن','الذات'],low:'إطلاقاً',high:'إلى حد كبير',result:'خطوة صغيرة لليوم',back:'العودة للرئيسية',dashboard:'نمطك الأخير',noEntries:'لا توجد تسجيلات محفوظة بعد.',avg:'المتوسط',export:'تصدير نسخة احتياطية مشفرة',safety:'أنت تستحق دعماً بشرياً فورياً.',safetyText:'إذا كنت قد تؤذي نفسك أو شخصاً آخر، فاتصل بخدمات الطوارئ الآن أو اذهب إلى أقرب قسم طوارئ. ابقَ بالقرب من شخص آخر إن استطعت.',police:'شرطة الإمارات',ambulance:'إسعاف الإمارات',sakina:'دعم الصحة النفسية في أبوظبي',official:'المصادر الرسمية',safeBack:'أنا آمن الآن — العودة للرئيسية',lock:'يُقفل التقدم المحفوظ تلقائياً بعد خمس دقائق.',clear:'تم مسح جميع بيانات جذور.',savedOk:'تم التشفير على هذا الجهاز.',pick:'اختر تفضيلاً واحداً على الأقل.',pinNeed:'أدخل 6 أرقام على الأقل.',secure:'يتطلب الحفظ المشفر سياق متصفح آمناً. لا يزال بإمكانك استخدام الجلسة الخاصة.'}
};
const actions={
 work:['Protect a 20-minute transition after work—no messages and no decisions.','احمِ عشرين دقيقة بعد العمل بلا رسائل ولا قرارات.'],
 people:['Make one low-pressure plan: coffee, a walk, or a community gathering.','ضع خطة بسيطة: قهوة أو نزهة أو لقاء مجتمعي.'],
 home:['Bring one familiar ritual from home into tonight—food, music, or a quiet routine.','استعد طقساً مألوفاً من الوطن الليلة—طعاماً أو موسيقى أو عادة هادئة.'],
 self:['Put one small part of yourself back into the day—music, movement, rest, or creativity.','أعد جزءاً صغيراً من ذاتك إلى يومك—موسيقى أو حركة أو راحة أو إبداع.']};
let S={lang:'en',mode:null,pin:'',prefs:[],mood:'',scores:[],step:0,entries:[],last:null}; let audio=null,lockTimer=null;
function t(k){return T[S.lang][k]}
function setLang(){document.documentElement.lang=S.lang;document.documentElement.dir=S.lang==='ar'?'rtl':'ltr';$('#app').classList.toggle('rtl',S.lang==='ar');$('#lang').textContent=S.lang==='en'?'العربية':'English';document.querySelectorAll('[data-t]').forEach(e=>e.textContent=t(e.dataset.t))}
function toast(x){let e=$('#toast');e.textContent=x;e.classList.remove('hidden');setTimeout(()=>e.classList.add('hidden'),2200)}
function home(){S.step=0;$('#view').innerHTML=`<div class="hero"><div><div class="eyebrow">${t('eyebrow')}</div><h1>${S.lang==='en'?'Find your footing,<br><span>one small step</span> at a time.':'استعد توازنك،<br><span>خطوة صغيرة</span> كل مرة.'}</h1><p>${t('intro')}</p><div class="actions"><button class="primary" id="begin">${t('begin')}</button>${localStorage.getItem(KEY)?`<button class="secondary" id="history">${t('history')}</button>`:''}</div></div><div class="orbit"><i class="dot"></i><div class="orb-center">Rooted<br><small>جذور</small></div></div></div>`;$('#begin').onclick=privacy;let h=$('#history');if(h)h.onclick=unlock}
function privacy(){$('#view').innerHTML=`<section class="screen"><div class="eyebrow">01 · privacy</div><h1>${t('privacy')}</h1><p class="lead">${t('privacyText')}</p><label class="check"><input id="age" type="checkbox"> <span>${t('age')}</span></label><div class="choices"><button class="choice" data-mode="private"><strong>${t('private')}</strong>${t('privateD')}</button><button class="choice" data-mode="saved"><strong>${t('saved')}</strong>${t('savedD')}</button></div></section>`;document.querySelectorAll('[data-mode]').forEach(b=>b.onclick=()=>{if(!$('#age').checked)return;S.mode=b.dataset.mode;if(S.mode==='private')preferences();else if(!crypto.subtle)toast(t('secure'));else localStorage.getItem(KEY)?unlock():pinSetup()})}
function pinSetup(){$('#view').innerHTML=`<section class="screen"><h1>${t('pinTitle')}</h1><p class="lead">${t('pinText')}</p><input class="pin" id="pin" type="password" inputmode="numeric" maxlength="20" autocomplete="new-password"><div class="actions"><button class="primary" id="go">${t('continue')}</button></div></section>`;$('#go').onclick=()=>{let p=$('#pin').value;if(p.length<6)return toast(t('pinNeed'));S.pin=p;resetLock();preferences()}}
function unlock(){$('#view').innerHTML=`<section class="screen"><h1>${t('unlock')}</h1><input class="pin" id="pin" type="password" inputmode="numeric" autocomplete="current-password"><div class="actions"><button class="primary" id="go">${t('continue')}</button><button class="danger" id="erase">${t('erase')}</button></div><p class="small">${t('lock')}</p></section>`;$('#go').onclick=async()=>{try{let p=$('#pin').value,v=await decrypt(localStorage.getItem(KEY),p);S.pin=p;S.mode='saved';S.entries=v.entries||[];S.prefs=v.prefs||[];S.lang=v.lang||S.lang;setLang();resetLock();dashboard()}catch(e){toast(t('wrong'))}};$('#erase').onclick=()=>{localStorage.removeItem(KEY);S.entries=[];toast(t('clear'));home()}}
function preferences(){$('#view').innerHTML=`<section class="screen"><div class="eyebrow">02 · preferences</div><h2>${t('prefTitle')}</h2><p>${t('prefText')}</p><div class="prefs">${t('prefs').map((x,i)=>`<button class="pref ${S.prefs.includes(i)?'on':''}" data-i="${i}">${x}</button>`).join('')}</div><button class="primary" id="go">${t('continue')}</button></section>`;document.querySelectorAll('.pref').forEach(b=>b.onclick=()=>{let i=+b.dataset.i;S.prefs.includes(i)?S.prefs=S.prefs.filter(x=>x!==i):S.prefs.push(i);b.classList.toggle('on')});$('#go').onclick=()=>{if(!S.prefs.length)return toast(t('pick'));checkin()}}
function checkin(){if(S.step===0){$('#view').innerHTML=`<section class="screen"><div class="progress"><span style="width:16%"></span></div><h2>${t('moodQ')}</h2><div class="moods">${t('moods').map((x,i)=>`<button class="mood" data-i="${i}">${x}</button>`).join('')}</div></section>`;document.querySelectorAll('.mood').forEach(b=>b.onclick=()=>{let i=+b.dataset.i;if(i===5)return safety();S.mood=t('moods')[i];S.step=1;checkin()});return}let i=S.step-1;if(i<4){$('#view').innerHTML=`<section class="screen"><div class="progress"><span style="width:${20+S.step*16}%"></span></div><div class="eyebrow">${t('anchors')[i]} · ${S.step}/4</div><h2>${t('q')[i]}</h2><div class="scale">${[1,2,3,4,5].map(n=>`<button data-n="${n}">${n}</button>`).join('')}</div><div class="anchor-labels"><span>${t('low')}</span><span>${t('high')}</span></div></section>`;document.querySelectorAll('[data-n]').forEach(b=>b.onclick=()=>{S.scores[i]=+b.dataset.n;S.step++;checkin()});return}finish()}
async function finish(){let min=Math.min(...S.scores),idx=S.scores.indexOf(min),key=['work','people','home','self'][idx];S.last={date:new Date().toLocaleDateString(),mood:S.mood,scores:[...S.scores],weak:key};if(S.mode==='saved'){S.entries.push(S.last);await save();toast(t('savedOk'))}$('#view').innerHTML=`<section class="screen"><div class="eyebrow">${t('anchors')[idx]}</div><h1>${t('result')}</h1><div class="result"><h2>${actions[key][S.lang==='en'?0:1]}</h2></div><p class="note">${S.lang==='en'?'This suggestion is based only on the answers and preferences you chose today.':'يعتمد هذا الاقتراح فقط على إجاباتك وتفضيلاتك اليوم.'}</p><div class="actions"><button class="primary" id="done">${S.mode==='saved'?t('dashboard'):t('back')}</button></div></section>`;$('#done').onclick=S.mode==='saved'?dashboard:home}
function dashboard(){let es=S.entries;$('#view').innerHTML=`<section class="screen"><h1>${t('dashboard')}</h1>${es.length?`<div class="cards">${[0,1,2,3].map(i=>{let a=(es.reduce((n,e)=>n+(e.scores[i]||0),0)/es.length).toFixed(1);return`<div class="stat"><b>${a}</b>${t('anchors')[i]} ${t('avg')}</div>`}).join('')}</div><table class="history"><thead><tr><th>Date</th><th>${t('anchors').join(' · ')}</th></tr></thead><tbody>${es.slice(-7).reverse().map(e=>`<tr><td>${e.date}</td><td>${e.scores.join(' · ')}</td></tr>`).join('')}</tbody></table>`:`<p>${t('noEntries')}</p>`}<div class="actions"><button class="primary" id="new">${t('begin')}</button><button class="secondary" id="export">${t('export')}</button><button class="danger" id="erase">${t('erase')}</button></div><p class="lock">${t('lock')}</p></section>`;$('#new').onclick=()=>{S.step=0;S.scores=[];S.mood='';checkin()};$('#export').onclick=()=>{let blob=new Blob([localStorage.getItem(KEY)||''],{type:'application/json'}),a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='rooted-encrypted-backup.json';a.click();URL.revokeObjectURL(a.href)};$('#erase').onclick=()=>{localStorage.removeItem(KEY);S.entries=[];toast(t('clear'));home()}}
function safety(){stopSound();$('#view').innerHTML=`<section class="screen safety"><h1>${t('safety')}</h1><p class="lead">${t('safetyText')}</p><a class="hotline" href="tel:999"><b>999</b>${t('police')}</a><a class="hotline" href="tel:998"><b>998</b>${t('ambulance')}</a><a class="hotline" href="tel:800725462"><b>800-SAKINA (800-725462)</b>${t('sakina')}</a><p class="small">${t('official')}: <a target="_blank" rel="noopener" href="https://u.ae/en/information-and-services/justice-safety-and-the-law/handling-emergencies">UAE Government</a> · <a target="_blank" rel="noopener" href="https://www.doh.gov.ae/en/news/doh-activates-247-mental-health-support-hotline-800-sakina-%28725462%29">Abu Dhabi DoH</a></p><button class="secondary" id="safe">${t('safeBack')}</button></section>`;$('#safe').onclick=home}
async function keyFor(pin,salt){let base=await crypto.subtle.importKey('raw',new TextEncoder().encode(pin),'PBKDF2',false,['deriveKey']);return crypto.subtle.deriveKey({name:'PBKDF2',salt,iterations:180000,hash:'SHA-256'},base,{name:'AES-GCM',length:256},false,['encrypt','decrypt'])}
function b64(a){return btoa(String.fromCharCode(...new Uint8Array(a)))}function bytes(s){return Uint8Array.from(atob(s),c=>c.charCodeAt(0))}
async function encrypt(data,pin){let salt=crypto.getRandomValues(new Uint8Array(16)),iv=crypto.getRandomValues(new Uint8Array(12)),key=await keyFor(pin,salt),ct=await crypto.subtle.encrypt({name:'AES-GCM',iv},key,new TextEncoder().encode(JSON.stringify(data)));return JSON.stringify({v:1,salt:b64(salt),iv:b64(iv),data:b64(ct)})}
async function decrypt(raw,pin){let o=JSON.parse(raw),key=await keyFor(pin,bytes(o.salt)),pt=await crypto.subtle.decrypt({name:'AES-GCM',iv:bytes(o.iv)},key,bytes(o.data));return JSON.parse(new TextDecoder().decode(pt))}
async function save(){localStorage.setItem(KEY,await encrypt({lang:S.lang,prefs:S.prefs,entries:S.entries},S.pin));resetLock()}
function resetLock(){clearTimeout(lockTimer);if(S.mode==='saved')lockTimer=setTimeout(()=>{S.pin='';S.entries=[];S.mode=null;unlock()},300000)}
function startSound(){audio=new (window.AudioContext||window.webkitAudioContext)();let gain=audio.createGain();gain.gain.value=.025;gain.connect(audio.destination);[174,261.6].forEach((f,i)=>{let o=audio.createOscillator();o.type=i?'sine':'triangle';o.frequency.value=f;o.connect(gain);o.start()});$('#sound').classList.add('on')}
function stopSound(){if(audio){audio.close();audio=null}$('#sound').classList.remove('on')}
$('#lang').onclick=()=>{S.lang=S.lang==='en'?'ar':'en';setLang();home()};$('#sound').onclick=()=>audio?stopSound():startSound();['click','keydown','touchstart'].forEach(e=>document.addEventListener(e,resetLock,{passive:true}));setLang();home();
})();
</script>
</body>
</html>
